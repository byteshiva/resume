
name: Build and Deploy Resumes

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and Deploy with manoelcampos/asciidoctor-ghpages-action
        uses: manoelcampos/asciidoctor-ghpages-action@v2
        with:
          # Base directory and theme for all .adoc files
          asciidoctor_params: '-B . -a stylesheet=themes/resume.css --attribute=nofooter'
          # Enable PDF build for the main file
          pdf_build: true
          ebook_main_adoc_file: 'latest'

          # Finalize site structure before deploying
          post_build: |
            # Set latest.adoc as the root index.html, applying theme
            asciidoctor -B . -a stylesheet=themes/resume.css latest.adoc -o index.html
            
            # Rebuild PDF to ensure custom theme is correctly applied
            asciidoctor-pdf -B . -a pdf-stylesdir=themes -a pdf-style=resume latest.adoc -o latest.pdf

            # Copy our static files into the build directory from the repo root
            cp ../dashboard.html ./
            cp ../resumes.json ./

            # Add all generated and static files to the gh-pages commit
            git add -f index.html latest.pdf dashboard.html resumes.json
