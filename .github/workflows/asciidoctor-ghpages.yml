name: Build and Deploy Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Ruby and Asciidoctor
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
      - name: Install Asciidoctor and dependencies
        run: |
          gem install asciidoctor
          gem install asciidoctor-pdf
          gem install asciidoctor-diagram

      - name: Build Site
        run: |
          # Create the output directory
          mkdir public
          
          # Build all AsciiDoc files into HTML
          asciidoctor -B . -D public -r asciidoctor-diagram tailored_resumes/*.adoc -a stylesheet=themes/resume.css --attribute=nofooter
          asciidoctor -B . -D public -r asciidoctor-diagram -o index.html latest.adoc -a stylesheet=themes/resume.css --attribute=nofooter
          
          # Build the PDF for the latest resume
          asciidoctor-pdf -B . -D public -o latest.pdf latest.adoc -a pdf-themesdir=themes -a pdf-theme=resume

          # Copy the static files into the public directory
          cp dashboard.html public/dashboard.html
          cp resumes.json public/resumes.json
          cp -r themes public/themes

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
