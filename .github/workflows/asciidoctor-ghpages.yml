name: Build and Deploy Resumes

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and Deploy with manoelcampos/asciidoctor-ghpages-action
        uses: manoelcampos/asciidoctor-ghpages-action@v2
        with:
          # This action only processes .adoc files by default. We will handle ALL file
          # operations in the post_build step for clarity and control.
          asciidoctor_params: '--attribute=nofooter'

          post_build: |
            # The build action runs in a temporary dir. We copy our source files into it.
            # $GITHUB_WORKSPACE is a reliable absolute path to the repository root.
            cp $GITHUB_WORKSPACE/dashboard.html .
            cp $GITHUB_WORKSPACE/resumes.json .
            cp -r $GITHUB_WORKSPACE/themes .
            cp $GITHUB_WORKSPACE/latest.adoc .
            cp -r $GITHUB_WORKSPACE/tailored_resumes .

            # Build all AsciiDoc files into HTML
            asciidoctor -B . -D . -a stylesheet=themes/resume.css tailored_resumes/*.adoc
            asciidoctor -B . -D . -a stylesheet=themes/resume.css latest.adoc -o index.html
            
            # Build the PDF for the latest resume
            asciidoctor-pdf -B . -D . -o latest.pdf latest.adoc -a pdf-themesdir=themes -a pdf-theme=resume

            # Final verification of files to be deployed
            echo "--- Deploying Files: ---"
            ls -R
            echo "-----------------------"

            # Add all generated and static files to the gh-pages commit
            git add -f *.html *.pdf *.json themes
